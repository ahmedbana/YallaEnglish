<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتيجة الدفع | يلا إنجلش</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --coral: #ED5A2C;
            --midnight: #0F1B3A;
            --cream: #FCF1E4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .success-card {
            background: #fff;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(237, 90, 44, 0.15);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
        }
        .loading-icon {
            width: 80px;
            height: 80px;
            border: 4px solid var(--cream);
            border-top: 4px solid var(--coral);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            color: var(--midnight);
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
        }
        p {
            color: #6B665E;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 1rem;
        }
        .highlight {
            color: var(--coral);
            font-weight: 700;
        }
        .steps {
            text-align: right;
            background: var(--cream);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        .steps h3 {
            color: var(--midnight);
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }
        .steps li {
            color: #6B665E;
            margin-bottom: 0.5rem;
            padding-right: 0.5rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: var(--coral);
            color: #fff;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(237, 90, 44, 0.3);
        }
        #loading-state, #success-state { display: block; }
        #success-state { display: none; }
    </style>
</head>
<body>
    <div class="success-card">
        <!-- Loading State -->
        <div id="loading-state">
            <div class="loading-icon"></div>
            <h1>جاري التحقق من الدفع...</h1>
            <p>يرجى الانتظار</p>
        </div>

        <!-- Success State (shown after verification) -->
        <div id="success-state">
            <div class="success-icon">✅</div>
            <h1>تم الدفع بنجاح! 🎉</h1>
            <p>مرحباً بك في عائلة <span class="highlight">يلا إنجلش</span></p>
            <p>تم تأكيد اشتراكك في عرض المؤسسين بنجاح.</p>

            <div class="steps">
                <h3>الخطوات القادمة:</h3>
                <ol>
                    <li>ستصلك رسالة على الواتساب خلال ٢٤ ساعة</li>
                    <li>سيتم تحديد موعد أول حصة لك</li>
                    <li>ابدأ رحلتك في تعلم الإنجليزية! 🚀</li>
                </ol>
            </div>

            <a href="index.html" class="btn">العودة للصفحة الرئيسية ←</a>
        </div>
    </div>

    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const tapId = params.get('tap_id');

            if (!tapId) {
                // No tap_id = direct visit, redirect to home
                window.location.href = '/index.html';
                return;
            }

            try {
                const res = await fetch(`/api/verify-charge/${tapId}`);
                const data = await res.json();

                if (data.status === 'CAPTURED') {
                    // Payment successful!
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('success-state').style.display = 'block';
                } else {
                    // Payment failed or cancelled
                    const errorMsg = data.status === 'CANCELLED' 
                        ? 'تم إلغاء عملية الدفع' 
                        : 'فشلت عملية الدفع، يرجى المحاولة مرة أخرى';
                    window.location.href = `/index.html?payment_error=${encodeURIComponent(errorMsg)}#booking`;
                }
            } catch (err) {
                console.error('Verify error:', err);
                window.location.href = `/index.html?payment_error=${encodeURIComponent('حدث خطأ في التحقق من الدفع')}#booking`;
            }
        })();
    </script>
</body>
</html>
