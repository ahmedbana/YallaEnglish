<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الدفع بنجاح | يلا إنجلش</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --coral: #ED5A2C;
            --midnight: #0F1B3A;
            --cream: #FCF1E4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .success-card {
            background: #fff;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(237, 90, 44, 0.15);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
        }
        h1 {
            color: var(--midnight);
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
        }
        p {
            color: #6B665E;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 1rem;
        }
        .highlight {
            color: var(--coral);
            font-weight: 700;
        }
        .steps {
            text-align: right;
            background: var(--cream);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        .steps h3 {
            color: var(--midnight);
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }
        .steps li {
            color: #6B665E;
            margin-bottom: 0.5rem;
            padding-right: 0.5rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: var(--coral);
            color: #fff;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(237, 90, 44, 0.3);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✅</div>
        <h1>تم الدفع بنجاح! 🎉</h1>
        <p>مرحباً بك في عائلة <span class="highlight">يلا إنجلش</span></p>
        <p>تم تأكيد اشتراكك في عرض المؤسسين بنجاح.</p>

        <div class="steps">
            <h3>الخطوات القادمة:</h3>
            <ol>
                <li>ستصلك رسالة على الواتساب خلال ٢٤ ساعة</li>
                <li>سيتم تحديد موعد أول حصة لك</li>
                <li>ابدأ رحلتك في تعلم الإنجليزية! 🚀</li>
            </ol>
        </div>

        <a href="index.html" class="btn">العودة للصفحة الرئيسية ←</a>
    </div>
</body>
</html>
